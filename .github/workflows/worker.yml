name: Perpl Echo Worker

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run one-time historical candle backfill"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      backfill_days:
        description: "Backfill lookback days when backfill=true"
        required: false
        default: "7"
      backfill_symbol:
        description: "Optional single market symbol to backfill, for example SOL"
        required: false
        default: ""

concurrency:
  group: perpl-echo-worker
  cancel-in-progress: false

jobs:
  worker-once:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      WORKER_NAME: perpl-echo-github-actions
      PERPL_API_BASE_URL: ${{ secrets.PERPL_API_BASE_URL }}
      MONAD_RPC_URL: ${{ secrets.MONAD_RPC_URL }}
      PERPL_CHAIN_ID: ${{ secrets.PERPL_CHAIN_ID }}
      PERPL_CONTRACT_ADDRESSES: ${{ secrets.PERPL_CONTRACT_ADDRESSES }}
      SNAPSHOT_COLLECTOR_ENABLED: ${{ secrets.SNAPSHOT_COLLECTOR_ENABLED }}
      ONCHAIN_INDEXER_ENABLED: ${{ secrets.ONCHAIN_INDEXER_ENABLED }}
      WORKER_ENABLED: ${{ secrets.WORKER_ENABLED }}
      WORKER_DERIVED_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill == 'true' && 'full' || 'light' }}
      COLLECTOR_INTERVAL_MS: "300000"
      ONCHAIN_POLL_INTERVAL_MS: "5000"
      BACKFILL_ON_START: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill == 'true' && 'true' || secrets.BACKFILL_ON_START }}
      BACKFILL_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill == 'true' && 'true' || 'false' }}
      BACKFILL_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill == 'true' && inputs.backfill_days || secrets.BACKFILL_DAYS }}
      BACKFILL_SYMBOL: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill == 'true' && inputs.backfill_symbol || '' }}
      BACKFILL_MIN_SNAPSHOTS: ${{ secrets.BACKFILL_MIN_SNAPSHOTS }}
      RETENTION_ENABLED: "true"
      RAW_SNAPSHOT_RETENTION_DAYS: "30"
      RAW_ONCHAIN_EVENT_RETENTION_DAYS: "7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run one worker cycle
        run: npm run worker:once
