name: Perpl Echo Worker

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

concurrency:
  group: perpl-echo-worker
  cancel-in-progress: true

jobs:
  worker-once:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      WORKER_NAME: perpl-echo-github-actions
      PERPL_API_BASE_URL: ${{ secrets.PERPL_API_BASE_URL }}
      MONAD_RPC_URL: ${{ secrets.MONAD_RPC_URL }}
      PERPL_CHAIN_ID: ${{ secrets.PERPL_CHAIN_ID }}
      PERPL_CONTRACT_ADDRESSES: ${{ secrets.PERPL_CONTRACT_ADDRESSES }}
      SNAPSHOT_COLLECTOR_ENABLED: ${{ secrets.SNAPSHOT_COLLECTOR_ENABLED }}
      ONCHAIN_INDEXER_ENABLED: ${{ secrets.ONCHAIN_INDEXER_ENABLED }}
      WORKER_ENABLED: ${{ secrets.WORKER_ENABLED }}
      COLLECTOR_INTERVAL_MS: "300000"
      ONCHAIN_POLL_INTERVAL_MS: "5000"
      BACKFILL_ON_START: ${{ secrets.BACKFILL_ON_START }}
      BACKFILL_FORCE: "false"
      BACKFILL_DAYS: ${{ secrets.BACKFILL_DAYS }}
      BACKFILL_MIN_SNAPSHOTS: ${{ secrets.BACKFILL_MIN_SNAPSHOTS }}
      RETENTION_ENABLED: "true"
      RAW_SNAPSHOT_RETENTION_DAYS: "30"
      RAW_ONCHAIN_EVENT_RETENTION_DAYS: "7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run one worker cycle
        run: npm run worker:once
