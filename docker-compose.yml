services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: perpl
      POSTGRES_PASSWORD: perpl
      POSTGRES_DB: perpl_market_state_search
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perpl -d perpl_market_state_search"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: perpl-market-state-search-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://perpl:perpl@postgres:5432/perpl_market_state_search?schema=public
      NODE_OPTIONS: --max-old-space-size=384
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && npm run start"

  worker:
    image: perpl-market-state-search-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://perpl:perpl@postgres:5432/perpl_market_state_search?schema=public
      NODE_OPTIONS: --max-old-space-size=384
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npm run worker"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
